<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxee Studio - Reserva Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playball&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --dorado: #c5a021; 
            --negro: #121212; 
            --blanco: #ffffff; 
            --transparente: rgba(255, 255, 255, 0.96); 
            --insta: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --fuente-titulo: 'Playball', cursive;
            --fuente-texto: 'Montserrat', sans-serif;
        }

        body { 
            font-family: var(--fuente-texto); 
            margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), 
                        url('https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=1200&q=80') no-repeat center center;
            background-size: cover;
            background-attachment: scroll;
            min-height: 100vh;
        }

        @media (min-width: 768px) { body { background-attachment: fixed; } }
        
        header { 
            background: rgba(10, 10, 10, 0.95); 
            color: var(--dorado); 
            padding: 10px 15px; 
            border-bottom: 2px solid var(--dorado);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-wrapper {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid var(--dorado);
            object-fit: cover;
        }

        .brand-info { text-align: center; flex-grow: 1; }
        header h1 { margin: 0; font-family: var(--fuente-titulo); font-size: 1.8em; font-weight: normal; line-height: 1; }
        header p { margin: 2px 0 0 0; font-size: 0.6em; letter-spacing: 2px; text-transform: uppercase; color: #aaa; }

        .btn-insta {
            background: var(--insta);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* CONTENEDOR FORMULARIO */
        .container { 
            max-width: 420px; 
            margin: 20px auto; 
            background: var(--transparente); 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
        }

        .seccion-titulo { 
            color: var(--negro); 
            border-bottom: 2px solid var(--dorado); 
            display: inline-block; 
            padding-bottom: 3px; 
            margin-bottom: 15px; 
            font-size: 1.1em;
            font-weight: 600;
            text-transform: uppercase;
            text-align: left; /* Asegura alineación a la izquierda */
        }
        
        /* CORRECCIÓN DE SERVICIOS - ALINEACIÓN IZQUIERDA */
        .servicios-grid { 
            display: grid; 
            gap: 8px; 
            text-align: left; /* Forzamos alineación izquierda */
        }

        .servicio-option { 
            display: flex; 
            align-items: center; 
            justify-content: flex-start; /* Alinea contenido al inicio */
            background: #fff; 
            padding: 12px; 
            border: 1px solid #eee; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 0.95em;
            transition: 0.2s;
        }

        .servicio-option:hover {
            border-color: var(--dorado);
            background: #fffcf0;
        }

        .servicio-option input { 
            margin: 0 12px 0 0; /* Margen solo a la derecha del checkbox */
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        label { 
            display: block; 
            margin-top: 15px; 
            font-weight: 600; 
            font-size: 0.75em; 
            text-transform: uppercase; 
            color: #555; 
            text-align: left;
        }

        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        
        textarea { display: none; border-left: 3px solid var(--dorado); background: #fffcf0; }

        .btn-whatsapp { 
            background: var(--negro); color: var(--dorado); border: 2px solid var(--dorado); 
            font-weight: bold; cursor: pointer; margin-top: 25px; width: 100%; padding: 15px; 
            border-radius: 12px; text-transform: uppercase; font-size: 1em; 
        }

        /* MODALES Y ADMIN */
        #modalGracias { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 280px; border: 2px solid var(--dorado); }
        #seccionAdmin { display: none; background: white; padding: 20px; margin: 20px; border-radius: 15px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
        th { background: var(--negro); color: var(--dorado); padding: 10px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>

</div>

<div id="modalGracias">

        <p style="font-size: 0.85em;"><strong>Recuerda pulsar "Enviar" en el chat de WhatsApp.</strong></p>
        <button onclick="document.getElementById('modalGracias').style.display='none'" style="background:var(--negro); color:var(--dorado); border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">CERRAR</button>
    </div>
</div>

<div id="seccionAdmin">

    <table id="tablaCitas">
        <thead>
            <tr><th>Fecha</th><th>Nombre</th><th>Tel</th><th>Servicios</th></tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>
