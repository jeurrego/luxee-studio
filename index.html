<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxee Studio - Reserva Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playball&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --dorado: #c5a021; 
            --negro: #121212; 
            --blanco: #ffffff; 
            --transparente: rgba(255, 255, 255, 0.96); 
            --insta: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --fuente-titulo: 'Playball', cursive;
            --fuente-texto: 'Montserrat', sans-serif;
        }

        body { 
            font-family: var(--fuente-texto); 
            margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), 
                        url('https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=1200&q=80') no-repeat center center;
            background-size: cover;
            background-attachment: scroll;
            min-height: 100vh;
        }

        @media (min-width: 768px) { body { background-attachment: fixed; } }
        
        /* CABECERA HORIZONTAL COMPACTA */
        header { 
            background: rgba(10, 10, 10, 0.95); 
            color: var(--dorado); 
            padding: 10px 15px; 
            border-bottom: 2px solid var(--dorado);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-wrapper {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Logo izq, Título centro, Insta der */
        }

        .logo-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid var(--dorado);
            object-fit: cover;
        }

        .brand-info {
            text-align: center;
            flex-grow: 1;
        }

        header h1 { 
            margin: 0; 
            font-family: var(--fuente-titulo);
            font-size: 1.8em; 
            font-weight: normal;
            line-height: 1;
        }

        header p {
            margin: 2px 0 0 0;
            font-size: 0.6em;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #aaa;
        }

        .btn-insta {
            background: var(--insta);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* CONTENEDOR FORMULARIO */
        .container { 
            max-width: 420px; 
            margin: 20px auto; 
            background: var(--transparente); 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
        }

        .seccion-titulo { 
            color: var(--negro); 
            border-bottom: 2px solid var(--dorado); 
            display: inline-block; 
            padding-bottom: 3px; 
            margin-bottom: 15px; 
            font-size: 1.1em;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .servicios-grid { display: grid; gap: 8px; }
        .servicio-option { display: flex; align-items: center; background: #fff; padding: 10px; border: 1px solid #eee; border-radius: 10px; cursor: pointer; font-size: 0.9em; }
        .servicio-option input { margin-right: 12px; }
        
        label { display: block; margin-top: 12px; font-weight: 600; font-size: 0.75em; text-transform: uppercase; color: #555; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        
        textarea { display: none; border-left: 3px solid var(--dorado); background: #fffcf0; }

        .btn-whatsapp { 
            background: var(--negro); color: var(--dorado); border: 2px solid var(--dorado); 
            font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; padding: 14px; 
            border-radius: 10px; text-transform: uppercase; font-size: 0.95em; 
        }

        /* MODALES Y ADMIN */
        #modalGracias { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 280px; border: 2px solid var(--dorado); }
        #seccionAdmin { display: none; background: white; padding: 20px; margin: 20px; border-radius: 15px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
        th { background: var(--negro); color: var(--dorado); padding: 10px; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <div class="header-wrapper">
        <img src="logo_luxee.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
        
        <div class="brand-info">
            <h1 id="tituloLogo">Luxee Studio</h1>
            <p>BY ELIZA MARTIN</p>
        </div>

        <a href="https://www.instagram.com/luxee_.studio?igsh=MWx5aXpiYzl6ZG55ZA==" target="_blank" class="btn-insta" rel="noopener noreferrer">
            <i class="fab fa-instagram"></i>
        </a>
    </div>
</header>

<div class="container">
    <h3 class="seccion-titulo">Reservar Cita</h3>
    <form id="reservaForm">
        <label>Nombre Completo</label>
        <input type="text" id="nombre" placeholder="Tu nombre" required>

        <label>WhatsApp</label>
        <input type="tel" id="telCliente" placeholder="Ej: 300 123 4567" required>

        <label>Servicios</label>
        <div class="servicios-grid">
            <label class="servicio-option"><input type="checkbox" name="srv" value="Maquillaje"> Maquillaje</label>
            <label class="servicio-option"><input type="checkbox" name="srv" value="Peinado"> Peinado</label>
            <label class="servicio-option"><input type="checkbox" name="srv" value="Color"> Coloración</label>
            <label class="servicio-option"><input type="checkbox" name="srv" value="Manicura"> Manicura</label>
            <label class="servicio-option"><input type="checkbox" name="srv" value="Otros" id="checkOtros"> Otros</label>
        </div>
        <textarea id="detalleOtros" rows="2" placeholder="¿Qué necesitas?"></textarea>

        <label>Fecha y Hora</label>
        <div style="display: flex; gap: 10px;">
            <input type="date" id="fecha" required>
            <input type="time" id="hora" required>
        </div>

        <button type="submit" class="btn-whatsapp">AGENDAR POR WHATSAPP 📱</button>
    </form>
</div>

<div id="modalGracias">
    <div class="modal-content">
        <h2 style="font-family: var(--fuente-titulo); color: var(--dorado); margin: 0;">¡Gracias! ✨</h2>
        <p>Tu solicitud fue generada exitosamente.</p>
        <p style="font-size: 0.85em;"><strong>Pulsa "Enviar" en el WhatsApp que se abrirá para confirmar.</strong></p>
        <button onclick="document.getElementById('modalGracias').style.display='none'" style="background:var(--negro); color:var(--dorado); border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">ENTENDIDO</button>
    </div>
</div>

<div id="seccionAdmin">
    <h3>📋 Agenda - Luxee Studio</h3>
    <button onclick="exportarExcel()" style="background:#28a745; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer; margin-bottom:10px;">📊 Excel</button>
    <table id="tablaCitas">
        <thead>
            <tr><th>Fecha</th><th>Nombre</th><th>Tel</th><th>Servicios</th></tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

<script>
    const form = document.getElementById('reservaForm');
    const titulo = document.getElementById('tituloLogo');
    const admin = document.getElementById('seccionAdmin');
    const checkOtros = document.getElementById('checkOtros');
    const detalleOtros = document.getElementById('detalleOtros');

    window.onload = mostrarCitas;

    checkOtros.addEventListener('change', function() {
        detalleOtros.style.display = this.checked ? 'block' : 'none';
    });

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        let serviciosArr = Array.from(document.querySelectorAll('input[name="srv"]:checked')).map(cb => cb.value);
        if (serviciosArr.length === 0) return alert("Selecciona un servicio.");

        if (checkOtros.checked) {
            const index = serviciosArr.indexOf("Otros");
            serviciosArr[index] = `Otros: ${detalleOtros.value}`;
        }

        const cita = {
            nombre: document.getElementById('nombre').value,
            telefono: document.getElementById('telCliente').value,
            servicios: serviciosArr.join(" / "),
            fecha: document.getElementById('fecha').value,
            hora: document.getElementById('hora').value
        };

        let historial = JSON.parse(localStorage.getItem('luxeeAgendaFinalV9')) || [];
        historial.push(cita);
        localStorage.setItem('luxeeAgendaFinalV9', JSON.stringify(historial));

        const miTelefono = "573000000000"; 
        const texto = `✨ *NUEVA CITA LUXEE STUDIO* ✨\n\n👤 *Clienta:* ${cita.nombre}\n📞 *Tel:* ${cita.telefono}\n💆‍♀️ *Servicios:* ${cita.servicios}\n📅 *Fecha:* ${cita.fecha}\n⏰ *Hora:* ${cita.hora}`;
        
        window.open(`https://wa.me/${miTelefono}?text=${encodeURIComponent(texto)}`, '_blank');
        document.getElementById('modalGracias').style.display = 'flex';
        form.reset();
        detalleOtros.style.display = 'none';
        mostrarCitas();
    });

    let clics = 0;
    titulo.addEventListener('click', () => {
        clics++;
        if (clics === 3) { admin.style.display = 'block'; admin.scrollIntoView(); clics = 0; }
    });

    function mostrarCitas() {
        let historial = JSON.parse(localStorage.getItem('luxeeAgendaFinalV9')) || [];
        const tabla = document.getElementById('cuerpoTabla');
        tabla.innerHTML = "";
        historial.reverse().forEach(c => {
            tabla.innerHTML += `<tr><td>${c.fecha} ${c.hora}</td><td>${c.nombre}</td><td>${c.telefono}</td><td>${c.servicios}</td></tr>`;
        });
    }

    function exportarExcel() {
        let historial = JSON.parse(localStorage.getItem('luxeeAgendaFinalV9')) || [];
        if(historial.length === 0) return;
        let csvContent = "data:text/csv;charset=utf-8,Fecha,Nombre,Telefono,Servicios\n";
        historial.forEach(c => { csvContent += `${c.fecha} ${c.hora},${c.nombre},${c.telefono},"${c.servicios}"\n`; });
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", "agenda_luxee.csv");
        document.body.appendChild(link);
        link.click();
    }
</script>
</body>
</html>
