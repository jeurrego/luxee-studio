<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxee Studio - Reserva Premium</title>
    <style>
        :root { 
            --dorado: #c5a021; 
            --negro: #121212; 
            --blanco: #ffffff; 
            --transparente: rgba(255, 255, 255, 0.94); 
            --insta: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        body { 
            font-family: 'Helvetica Neue', sans-serif; 
            margin: 0; 
            color: #333;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        header { 
            background: rgba(18, 18, 18, 0.85); 
            color: var(--dorado); 
            padding: 25px 20px; 
            text-align: center; 
            border-bottom: 2px solid var(--dorado);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .header-content { display: flex; align-items: center; justify-content: center; gap: 15px; }
        header h1 { margin: 0; letter-spacing: 4px; font-size: 1.8em; cursor: pointer; text-transform: uppercase; }

        .btn-insta {
            background: var(--insta);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .container { 
            max-width: 450px; 
            margin: 30px auto; 
            background: var(--transparente); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
        }

        /* Título de sección único y elegante */
        .seccion-titulo { 
            color: var(--negro); 
            border-bottom: 2px solid var(--dorado); 
            display: inline-block; 
            padding-bottom: 5px; 
            margin: 0 0 20px 0; 
            font-size: 1.3em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .servicios-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 10px; }
        .servicio-option { 
            display: flex; 
            align-items: center; 
            background: rgba(0,0,0,0.03); 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            cursor: pointer;
        }
        .servicio-option input { width: auto; margin-right: 12px; }
        
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.8em; text-transform: uppercase; color: #666; }
        input, textarea { 
            width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; 
        }
        
        #detalleOtros { display: none; margin-top: 10px; border-left: 4px solid var(--dorado); background: #fffcf0; }

        .btn-whatsapp { 
            background: var(--negro); 
            color: var(--dorado); 
            border: 2px solid var(--dorado); 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 25px; 
            width: 100%; 
            padding: 15px; 
            border-radius: 10px; 
            text-transform: uppercase;
            transition: 0.3s;
            font-size: 1em;
        }
        .btn-whatsapp:hover { background: var(--dorado); color: var(--negro); }

        /* MODAL DE AGRADECIMIENTO */
        #modalGracias {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 320px;
            border: 3px solid var(--dorado);
        }
        .modal-content h2 { color: var(--dorado); margin-top: 0; }
        .btn-cerrar {
            background: var(--negro); color: var(--dorado);
            border: none; padding: 12px 25px; border-radius: 8px;
            margin-top: 20px; cursor: pointer; font-weight: bold;
        }

        /* AGENDA PRIVADA */
        #seccionAdmin { 
            display: none; max-width: 95%; margin: 40px auto; padding: 20px; background: white; border-radius: 15px; overflow-x: auto; 
        }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8em; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--negro); color: var(--dorado); }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <h1 id="tituloLogo">LUXEE STUDIO</h1>
        <a href="https://www.instagram.com/luxee_.studio?igsh=MWx5aXpiYzl6ZG55ZA==" target="_blank" class="btn-insta">📸</a>
    </div>
    <p style="margin: 5px 0 0 0; font-size: 0.8em; letter-spacing: 2px;">BY ELIZA MARTIN</p>
</header>

<div class="container">
    <h3 class="seccion-titulo">Reservar tu Cita</h3>
    <form id="reservaForm">
        <label>Nombre Completo</label>
        <input type="text" id="nombre" placeholder="Tu nombre" required>

        <label>WhatsApp</label>
        <input type="tel" id="telCliente" placeholder="Tu número de celular" required>

        <label>Servicios deseados</label>
        <div class="servicios-grid">
            <label class="servicio-option"><input type="checkbox" name="srv" value="Maquillaje"> Maquillaje Profesional</label>
            <label class="servicio-option"><input type="checkbox" name="srv" value="Peinado"> Peinado y Estilismo</label>
            <label class="servicio-option"><input type="checkbox" name="srv" value="Color"> Coloración / Balayage</label>
            <label class="servicio-option"><input type="checkbox" name="srv" value="Manicura"> Manicura de Lujo</label>
            <label class="servicio-option"><input type="checkbox" name="srv" value="Otros" id="checkOtros"> Otros (Especificar)</label>
        </div>
        
        <textarea id="detalleOtros" rows="2" placeholder="Describe aquí lo que necesitas..."></textarea>

        <label>Fecha y Hora</label>
        <div style="display: flex; gap: 10px;">
            <input type="date" id="fecha" required>
            <input type="time" id="hora" required>
        </div>

        <button type="submit" class="btn-whatsapp">AGENDAR POR WHATSAPP 📱</button>
    </form>
</div>

<div id="modalGracias">
    <div class="modal-content">
        <h2>¡Gracias! ✨</h2>
        <p>Tu solicitud ha sido generada con éxito.</p>
        <p><strong>Por favor, pulsa "Enviar" en el chat de WhatsApp que se abrirá a continuación para confirmar.</strong></p>
        <button class="btn-cerrar" onclick="cerrarModal()">ENTENDIDO</button>
    </div>
</div>

<div id="seccionAdmin">
    <h3>📋 Agenda Interna - Luxee Studio</h3>
    <div style="margin-bottom: 15px;">
        <button onclick="exportarExcel()" style="background:#28a745; color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">📊 Descargar Excel</button>
        <button onclick="borrarTodo()" style="background:#fff; border:1px solid #ff4d4d; color:#ff4d4d; padding:10px 15px; border-radius:8px; cursor:pointer; margin-left:10px;">Limpiar Todo</button>
    </div>
    <table id="tablaCitas">
        <thead>
            <tr>
                <th>Fecha/Hora</th>
                <th>Clienta</th>
                <th>Teléfono</th>
                <th>Servicios</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

<script>
    const form = document.getElementById('reservaForm');
    const titulo = document.getElementById('tituloLogo');
    const admin = document.getElementById('seccionAdmin');
    const checkOtros = document.getElementById('checkOtros');
    const detalleOtros = document.getElementById('detalleOtros');
    const modal = document.getElementById('modalGracias');

    window.onload = mostrarCitas;

    checkOtros.addEventListener('change', function() {
        detalleOtros.style.display = this.checked ? 'block' : 'none';
        if(this.checked) detalleOtros.focus();
    });

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        let serviciosArr = Array.from(document.querySelectorAll('input[name="srv"]:checked'))
                                .map(cb => cb.value);

        if (serviciosArr.length === 0) return alert("Por favor selecciona un servicio.");

        if (checkOtros.checked) {
            const index = serviciosArr.indexOf("Otros");
            serviciosArr[index] = `Otros: ${detalleOtros.value}`;
        }

        const cita = {
            nombre: document.getElementById('nombre').value,
            telefono: document.getElementById('telCliente').value,
            servicios: serviciosArr.join(" / "),
            fecha: document.getElementById('fecha').value,
            hora: document.getElementById('hora').value
        };

        // Guardar base de datos
        let historial = JSON.parse(localStorage.getItem('luxeeAgendaFinal')) || [];
        historial.push(cita);
        localStorage.setItem('luxeeAgendaFinal', JSON.stringify(historial));

        // Número de WhatsApp (IMPORTANTE: Cambiar aquí)
        const miTelefono = "573142245541"; 
        const texto = `✨ *NUEVA CITA LUXEE STUDIO* ✨\n\n👤 *Clienta:* ${cita.nombre}\n📞 *Tel:* ${cita.telefono}\n💆‍♀️ *Servicios:* ${cita.servicios}\n📅 *Fecha:* ${cita.fecha}\n⏰ *Hora:* ${cita.hora}`;
        
        window.open(`https://wa.me/${miTelefono}?text=${encodeURIComponent(texto)}`, '_blank');
        
        modal.style.display = 'flex';
        mostrarCitas();
        form.reset();
        detalleOtros.style.display = 'none';
    });

    function cerrarModal() { modal.style.display = 'none'; }

    // Acceso secreto (3 clics)
    let clics = 0;
    titulo.addEventListener('click', () => {
        clics++;
        if (clics === 3) { admin.style.display = 'block'; admin.scrollIntoView({ behavior: 'smooth' }); clics = 0; }
    });

    function mostrarCitas() {
        let historial = JSON.parse(localStorage.getItem('luxeeAgendaFinal')) || [];
        const tabla = document.getElementById('cuerpoTabla');
        tabla.innerHTML = "";
        historial.reverse().forEach(c => {
            tabla.innerHTML += `<tr><td>${c.fecha} ${c.hora}</td><td>${c.nombre}</td><td>${c.telefono}</td><td>${c.servicios}</td></tr>`;
        });
    }

    function exportarExcel() {
        let historial = JSON.parse(localStorage.getItem('luxeeAgendaFinal')) || [];
        if(historial.length === 0) return alert("No hay datos.");
        let csvContent = "data:text/csv;charset=utf-8,Fecha,Clienta,Telefono,Servicios\n";
        historial.forEach(c => { csvContent += `${c.fecha} ${c.hora},${c.nombre},${c.telefono},"${c.servicios}"\n`; });
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", "agenda_luxee_studio.csv");
        document.body.appendChild(link);
        link.click();
    }

    function borrarTodo() {
        if(confirm("¿Borrar historial?")) { localStorage.removeItem('luxeeAgendaFinal'); mostrarCitas(); }
    }
</script>
</body>
</html>
